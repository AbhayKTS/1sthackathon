name: Background Queue Workers Runner

on:
  schedule:
    - cron: '*/5 * * * *' # Run every 5 minutes
  workflow_dispatch: # Enable manual run from GitHub UI

jobs:
  run-workers:
    name: Execute Sequential Workers
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Mail Queue Worker
        run: |
          echo "========================================="
          echo "Triggering Mail Queue Worker..."
          echo "========================================="
          curl -X POST "${{ secrets.API_URL }}/api/internal/mail-worker" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Length: 0" \
            --fail-with-body \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5
        continue-on-error: true

      - name: Invoke Timeline Scheduler Worker
        run: |
          echo "========================================="
          echo "Triggering Timeline Scheduler Worker..."
          echo "========================================="
          curl -X POST "${{ secrets.API_URL }}/api/internal/scheduler-worker" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Length: 0" \
            --fail-with-body \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5
        continue-on-error: true

      - name: Invoke Google Sheets Sync Worker
        run: |
          echo "========================================="
          echo "Triggering Google Sheets Sync Worker..."
          echo "========================================="
          curl -X POST "${{ secrets.API_URL }}/api/internal/sheets-worker" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Length: 0" \
            --fail-with-body \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5
        continue-on-error: true
