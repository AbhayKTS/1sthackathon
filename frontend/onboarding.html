<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Onboarding | RevengersHack</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Zen+Dots&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-background text-foreground relative grain dark flex items-center justify-center p-6">
    <div class="pointer-events-none fixed inset-0 -z-10">
        <div class="absolute -top-40 -left-40 h-[500px] w-[500px] rounded-full bg-blood/20 blur-3xl"></div>
        <div class="absolute -bottom-40 -right-40 h-[600px] w-[600px] rounded-full bg-blood/15 blur-3xl"></div>
    </div>

    <main class="w-full max-w-3xl bg-card border border-border p-8 relative overflow-hidden">
        <div class="absolute inset-0 scanlines opacity-20 pointer-events-none"></div>
        
        <div class="text-center mb-8 relative z-10">
            <h1 class="font-display text-4xl tracking-widest mb-2" style="font-family: 'Zen Dots', sans-serif;">ASSEMBLE YOUR <span class="text-blood">SQUAD</span></h1>
            <p class="font-mono text-sm text-muted-foreground" style="font-family: 'JetBrains Mono', monospace;">Provide your team details before accessing the dashboard. (2-5 members)</p>
        </div>

        <div id="rejectionNotesContainer" class="hidden relative z-10 mb-8 border border-strike-red bg-strike-red/10 p-4">
            <h3 class="font-impact text-xl text-strike-red tracking-widest mb-2" style="font-family: 'Bebas Neue', sans-serif;">⚠️ CHANGES REQUESTED BY ADMIN</h3>
            <p id="rejectionNotesText" class="font-mono text-sm text-white/80" style="font-family: 'JetBrains Mono', monospace;"></p>
        </div>

        <form id="onboardingForm" class="relative z-10 space-y-8">
            <!-- Team Info -->
            <div class="space-y-4 border-l-2 border-blood pl-4">
                <h2 class="font-impact text-2xl tracking-widest text-blood" style="font-family: 'Bebas Neue', sans-serif;">TEAM DETAILS</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="teamName" placeholder="TEAM NAME" required class="bg-input border border-border px-4 py-3 font-mono text-sm focus:outline-none focus:border-blood w-full" style="font-family: 'JetBrains Mono', monospace;">
                    <input type="text" id="college" placeholder="COLLEGE / UNIVERSITY" required class="bg-input border border-border px-4 py-3 font-mono text-sm focus:outline-none focus:border-blood w-full" style="font-family: 'JetBrains Mono', monospace;">
                </div>
            </div>

            <!-- Members -->
            <div class="space-y-4 border-l-2 border-blood pl-4">
                <div class="flex items-center justify-between">
                    <h2 class="font-impact text-2xl tracking-widest text-blood" style="font-family: 'Bebas Neue', sans-serif;">ROSTER</h2>
                    <button type="button" id="addMemberBtn" class="font-mono text-xs text-muted-foreground hover:text-white transition-colors" style="font-family: 'JetBrains Mono', monospace;">+ ADD MEMBER</button>
                </div>
                
                <div id="membersContainer" class="space-y-4">
                    <!-- Member 1 (Leader) -->
                    <div class="member-row grid grid-cols-1 md:grid-cols-4 gap-2 bg-black/40 p-4 border border-border/50 relative">
                        <div class="absolute -top-2 -left-2 bg-blood text-white font-mono text-[10px] px-2 py-0.5" style="font-family: 'JetBrains Mono', monospace;">LEADER</div>
                        <input type="text" name="m_name" placeholder="FULL NAME" required class="bg-input border border-border px-3 py-2 font-mono text-xs focus:outline-none focus:border-blood w-full col-span-1 md:col-span-1" style="font-family: 'JetBrains Mono', monospace;">
                        <input type="email" name="m_email" placeholder="EMAIL" required class="bg-input border border-border px-3 py-2 font-mono text-xs focus:outline-none focus:border-blood w-full col-span-1 md:col-span-1" style="font-family: 'JetBrains Mono', monospace;">
                        <input type="text" name="m_phone" placeholder="PHONE" required class="bg-input border border-border px-3 py-2 font-mono text-xs focus:outline-none focus:border-blood w-full col-span-1 md:col-span-1" style="font-family: 'JetBrains Mono', monospace;">
                        <input type="text" name="m_role" value="Leader" readonly class="bg-input border border-border px-3 py-2 font-mono text-xs focus:outline-none focus:border-blood w-full col-span-1 md:col-span-1 text-muted-foreground cursor-not-allowed" style="font-family: 'JetBrains Mono', monospace;">
                    </div>

                    <!-- Member 2 -->
                    <div class="member-row grid grid-cols-1 md:grid-cols-4 gap-2 bg-black/40 p-4 border border-border/50 relative">
                        <input type="text" name="m_name" placeholder="FULL NAME" required class="bg-input border border-border px-3 py-2 font-mono text-xs focus:outline-none focus:border-blood w-full col-span-1 md:col-span-1" style="font-family: 'JetBrains Mono', monospace;">
                        <input type="email" name="m_email" placeholder="EMAIL" required class="bg-input border border-border px-3 py-2 font-mono text-xs focus:outline-none focus:border-blood w-full col-span-1 md:col-span-1" style="font-family: 'JetBrains Mono', monospace;">
                        <input type="text" name="m_phone" placeholder="PHONE" required class="bg-input border border-border px-3 py-2 font-mono text-xs focus:outline-none focus:border-blood w-full col-span-1 md:col-span-1" style="font-family: 'JetBrains Mono', monospace;">
                        <input type="text" name="m_role" placeholder="ROLE (e.g. Developer)" required class="bg-input border border-border px-3 py-2 font-mono text-xs focus:outline-none focus:border-blood w-full col-span-1 md:col-span-1" style="font-family: 'JetBrains Mono', monospace;">
                    </div>
                </div>
            </div>

            <div id="formError" class="font-mono text-xs text-blood text-center" style="font-family: 'JetBrains Mono', monospace;"></div>

            <button type="submit" id="submitBtn" class="w-full font-impact tracking-widest text-lg px-6 py-4 bg-blood text-primary-foreground shadow-brutal hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all cursor-pointer" style="font-family: 'Bebas Neue', sans-serif;">
                INITIATE TEAM PROFILE
            </button>
        </form>
    </main>

    <script type="module" src="js/onboarding.js"></script>
</body>
</html>
