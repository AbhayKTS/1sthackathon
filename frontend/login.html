<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | RevengersHack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="/assets/images/image.webp">
    <style>
        .auth-wrapper {
            background: url("assets/images/bglog.webp");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .auth-panel {
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 50px 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid var(--strike-red);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
            width: 100%;
            max-width: 480px;
            z-index: 10;
            position: relative;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-title {
            color: rgba(255, 255, 255, 0.7);
            font-family: var(--font-mono);
            margin-top: 15px;
            letter-spacing: 3px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .auth-divider {
            text-align: center;
            margin: 30px 0;
            color: rgba(255, 255, 255, 0.3);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            letter-spacing: 2px;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .auth-divider::before {
            left: 0;
        }

        .auth-divider::after {
            right: 0;
        }

        .btn-google {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--white);
            font-family: var(--font-mono);
            padding: 15px 35px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--white);
        }

        #authError {
            color: var(--strike-red);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            margin-top: 20px;
            text-align: center;
            min-height: 20px;
        }

        .anime-bg {
            position: fixed;
            bottom: 0;
            height: 78vh;
            width: auto;
            object-fit: contain;
            object-position: bottom;
            z-index: 1;
            pointer-events: none;
        }

        .anime-bg.mikey {
            left: -10px;
            bottom: -35px;
            transform: translateX(10px);
        }

        .anime-bg.draken {
            right: 160px;
            bottom: 0;
            transform: translateX(-10px);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .auth-panel {
                max-width: 90%;
                padding: 40px 20px;
            }

            .anime-bg {
                opacity: 0.15;
            }

            .anime-bg.mikey {
                left: -50px;
                transform: scale(0.8);
            }

            .anime-bg.draken {
                right: 0px;
                transform: scale(0.8);
            }
        }
    </style>
</head>

<body class="auth-wrapper">

    <!-- Ambient Background Effects -->
    <div class="particles" aria-hidden="true"></div>
    <div class="scanlines"></div>

    <img loading="lazy" src="assets/images/download__23_-removebg-preview.webp" alt="Mikey" class="anime-bg mikey">
    <img loading="lazy" src="assets/images/SHINYOKOHAMA_PRINCE_HOTEL-removebg-preview.webp" alt="Draken" class="anime-bg draken">

    <div class="auth-panel">
        <div class="auth-logo">
            <a href="/" class="logo" style="display: inline-block;">
                <span class="logo-text" style="font-size: 2.2rem;">REVENGERSHACK</span>
            </a>
            <div class="auth-title" id="authTitle">Authentication Required</div>
        </div>

        <form id="loginForm">
            <!-- Step 1: Email -->
            <div id="stepEmail">
                <div class="form-group">
                    <input type="email" id="email" placeholder="EMAIL ADDRESS" autocomplete="username" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;" id="requestOtpBtn">REQUEST ACCESS CODE</button>

            </div>

            <!-- Step 2: OTP (Hidden by default) -->
            <div id="stepOtp" style="display: none;">
                <div class="form-group" style="margin-bottom: 20px;">
                    <input type="text" id="otpCode" placeholder="6-DIGIT CODE" autocomplete="one-time-code" pattern="\d{6}" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;" id="verifyOtpBtn">VERIFY CODE</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="#" id="resendOtpBtn" style="color: rgba(255,255,255,0.6); font-family: var(--font-mono); font-size: 0.8rem; text-decoration: underline; cursor: pointer; pointer-events: none; opacity: 0.5;">Resend Code (60s)</a>
                </div>
            </div>
        </form>

        <div id="authError"></div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="js/auth.js"></script>
</body>

</html>
