<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | RevengersHack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="/assets/images/image.png">
    <style>
        .auth-wrapper {
            background: url("assets/images/bglog.png");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .auth-panel {
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 50px 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid var(--strike-red);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
            width: 100%;
            max-width: 480px;
            z-index: 10;
            position: relative;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-title {
            color: rgba(255, 255, 255, 0.7);
            font-family: var(--font-mono);
            margin-top: 15px;
            letter-spacing: 3px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .auth-divider {
            text-align: center;
            margin: 30px 0;
            color: rgba(255, 255, 255, 0.3);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            letter-spacing: 2px;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .auth-divider::before {
            left: 0;
        }

        .auth-divider::after {
            right: 0;
        }

        .btn-google {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--white);
            font-family: var(--font-mono);
            padding: 15px 35px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--white);
        }

        #authError {
            color: var(--strike-red);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            margin-top: 20px;
            text-align: center;
            min-height: 20px;
        }

        .anime-bg {
            position: fixed;
            bottom: 0;
            height: 78vh;
            width: auto;
            object-fit: contain;
            object-position: bottom;
            z-index: 1;
            pointer-events: none;
        }

        .anime-bg.mikey {
            left: -10px;
            bottom: -35px;
            transform: translateX(10px);
        }

        .anime-bg.draken {
            right: 160px;
            bottom: 0;
            transform: translateX(-10px);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .auth-panel {
                max-width: 90%;
                padding: 40px 20px;
            }

            .anime-bg {
                opacity: 0.15;
            }

            .anime-bg.mikey {
                left: -50px;
                transform: scale(0.8);
            }

            .anime-bg.draken {
                right: 0px;
                transform: scale(0.8);
            }
        }
    </style>
</head>

<body class="auth-wrapper">

    <!-- Ambient Background Effects -->
    <div class="particles" aria-hidden="true"></div>
    <div class="scanlines"></div>

    <img src="assets/images/download__23_-removebg-preview.png" alt="Mikey" class="anime-bg mikey">
    <img src="assets/images/SHINYOKOHAMA_PRINCE_HOTEL-removebg-preview.png" alt="Draken" class="anime-bg draken">

    <div class="auth-panel">
        <div class="auth-logo">
            <a href="/" class="logo" style="display: inline-block;">
                <span class="logo-text" style="font-size: 2.2rem;">REVENGERSHACK</span>
            </a>
            <div class="auth-title" id="authTitle">Authentication Required</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="EMAIL ADDRESS" autocomplete="username" required>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <input type="password" id="password" placeholder="PASSWORD" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;" id="loginBtn">ACCESS TERMINAL</button>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="toggleAuthMode" style="color: rgba(255,255,255,0.6); font-family: var(--font-mono); font-size: 0.8rem; text-decoration: underline; cursor: pointer;">Don't have an account? Sign up</a>
            </div>
        </form>

        <div class="auth-divider">OR</div>

        <button class="btn-google" id="googleLoginBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            SIGN IN WITH GOOGLE
        </button>

        <div id="authError"></div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="js/auth.js"></script>
</body>

</html>
